name: jordan_tour_app
description: "Professional Jordan Tourism App - BTEC Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_rating_bar: ^4.0.1
  audioplayers: ^5.2.1
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  video_player: ^2.11.0
  chewie: ^1.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/videos/